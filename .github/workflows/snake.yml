# ═══════════════════════════════════════════════════════════════════════════
# FILE: .github/workflows/snake.yml
# PURPOSE: Auto-generates the contribution snake animation SVG
#
# SETUP INSTRUCTIONS:
# 1. Create a new repo named exactly: Jai-Shankar1033  (same as your username)
# 2. In that repo, go to Settings → Actions → General
#    → Set "Workflow permissions" to "Read and write permissions"
# 3. Place this file at .github/workflows/snake.yml
# 4. Push to main — the action will run automatically
# 5. After first run, a branch called "output" is created with the SVG files
# 6. The README.md references those SVG files automatically
# ═══════════════════════════════════════════════════════════════════════════

name: Generate Contribution Snake

on:
  # Runs automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"

  # Lets you trigger it manually from the Actions tab
  workflow_dispatch:

  # Also runs on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    name: 🐍 Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Generate both light and dark mode snake SVGs
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Step 3: Push the generated SVGs to the "output" branch
      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
